version: 2

models:
  - name: dim_patients
    description: "Consolidated patient dimension table"
    columns:
      - name: patient_id
        tests:
          - unique
          - not_null
      - name: age_years
        tests:
          - not_null

  - name: fct_encounters
    description: "Clinical encounters fact table"
    columns:
      - name: encounter_id
        tests:
          - unique
          - not_null
      - name: patient_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_patients')
              field: patient_id

  - name: fct_vitals
    description: "Patient vitals and observations fact table"
    columns:
      - name: observation_id
        tests:
          - unique
          - not_null
      - name: patient_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_patients')
              field: patient_id

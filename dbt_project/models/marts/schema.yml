version: 2

models:
  - name: dim_patients
    description: "Consolidated patient dimension table"
    columns:
      - name: patient_id
        tests:
          - unique
          - not_null
      - name: age_years
        tests:
          - not_null

  - name: fct_encounters
    description: "Clinical encounters fact table"
    columns:
      - name: encounter_id
        tests:
          - unique
          - not_null
      - name: patient_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_patients')
              field: patient_id

  - name: fct_vitals
    description: "Patient vitals and observations fact table"
    columns:
      - name: observation_id
        tests:
          - unique
          - not_null
      - name: patient_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_patients')
              field: patient_id

  - name: fct_medications
    description: "Medication requests and orders fact table"
    columns:
      - name: medication_request_id
        tests:
          - unique
          - not_null
      - name: patient_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_patients')
              field: patient_id

  - name: fct_procedures
    description: "Medical procedures fact table"
    columns:
      - name: procedure_id
        tests:
          - unique
          - not_null
      - name: patient_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_patients')
              field: patient_id

  - name: fct_conditions
    description: "Patient clinical conditions fact table"
    columns:
      - name: condition_id
        tests:
          - unique
          - not_null
      - name: patient_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_patients')
              field: patient_id

  - name: fct_immunizations
    description: "Patient immunization history fact table"
    columns:
      - name: immunization_id
        tests:
          - unique
          - not_null
      - name: patient_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_patients')
              field: patient_id

name: dbt_ci

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dbt-trino
        run: pip install dbt-trino

      - name: Start Mock Trino with Iceberg Catalog
        run: |
          # Create fake catalog directory
          mkdir -p /tmp/trino-catalog
          # Create an iceberg catalog that actually uses the memory connector
          echo "connector.name=memory" > /tmp/trino-catalog/iceberg.properties
          
          # Start Trino container with custom catalogs
          docker run -d --name trino -p 8080:8080 \
            -v /tmp/trino-catalog:/etc/trino/catalog:ro \
            trinodb/trino:latest
            
          # Wait for Trino to start
          until curl -s http://localhost:8080/v1/info; do
            echo "Waiting for Trino to be ready..."
            sleep 3
          done

      - name: Setup Mock Schemas
        run: |
          # Download Trino CLI
          curl -sLO https://repo1.maven.org/maven2/io/trino/trino-cli/435/trino-cli-435-executable.jar
          chmod +x trino-cli-435-executable.jar
          # Create required mock schema for dbt to compile against
          ./trino-cli-435-executable.jar --server localhost:8080 --execute "CREATE SCHEMA IF NOT EXISTS iceberg.landing;"

      - name: Configure dbt profile
        run: |
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          healthcare_mesh:
            target: dev
            outputs:
              dev:
                type: trino
                method: none
                user: admin
                host: localhost
                port: 8080
                catalog: iceberg
                schema: landing
                threads: 4
                http_scheme: http
          EOF

      - name: dbt Parse & Compile
        run: |
          cd dbt_project
          dbt parse
          dbt compile